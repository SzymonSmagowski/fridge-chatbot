# Production stack for the apartment-building VM.
# Lives at /srv/apps/fridge-chatbot/ on the VM. Started by deploy.sh.
# All env vars come from the gitignored .env populated by fetch-secrets.sh.
#
# Service inventory (13):
#   - caddy                    : reverse proxy, only service exposing :80
#   - fridge-backend           : FastAPI + LangGraph (image from Artifact Registry)
#   - fridge-frontend          : Next.js 16 (image from Artifact Registry)
#   - postgres + postgres-init : shared DB; init creates `langfuse` + `fridge_chatbot` DBs/users
#   - redis + redis-init       : shared cache; init creates `fridge-chatbot` ACL user
#   - clickhouse               : Langfuse traces analytics DB
#   - minio + minio-init       : Langfuse blob storage; init creates `langfuse` bucket
#   - langfuse-web + langfuse-worker : observability
#   - livekit-server           : WebRTC SFU for voice
#
# Volumes are bind-mounted under /srv/apps/fridge-chatbot/data/ so state survives
# container restarts AND Spot preemption (the persistent disk holds it).

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

services:

  # ----- Reverse proxy -------------------------------------------------------
  # Apartment-wide. Each app contributes ONE host block under conf.d/, loaded
  # via the `import /etc/caddy/conf.d/*.caddy` directive at the bottom of the
  # main Caddyfile. The mount below pulls each app's block from
  # /srv/apps/<app>/Caddyfile.<app> on the host — pre-deploy is responsible
  # for making sure the file exists (a `touch` in deploy.sh is enough).
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    logging: *default-logging
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - /srv/apps/portfolio-ai-lab/Caddyfile.portfolio:/etc/caddy/conf.d/portfolio-ai-lab.caddy:ro
      - ./data/caddy/data:/data
      - ./data/caddy/config:/config
    networks: [apartment]
    depends_on: [fridge-frontend, fridge-backend]

  # ----- Application: fridge-chatbot -----------------------------------------
  fridge-backend:
    image: ${FRIDGE_BACKEND_IMAGE}
    restart: unless-stopped
    logging: *default-logging
    networks: [apartment]
    depends_on:
      postgres-init: { condition: service_completed_successfully }
      redis-init:    { condition: service_completed_successfully }
    environment:
      ENVIRONMENT: prod
      AUTO_MIGRATE: "true"  # First deploy: migrations run on startup. Flip to "false" for hardened prod.
      # DB
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_USER: fridge_chatbot
      POSTGRES_PASSWORD: ${FRIDGE_DB_PASSWORD}
      POSTGRES_DB: fridge_chatbot
      # Redis (with per-app ACL user)
      REDIS_URL: redis://fridge-chatbot:${FRIDGE_REDIS_PASSWORD}@redis:6379
      # JWT / encryption
      SECRET_KEY: ${FRIDGE_JWT_SECRET_KEY}
      FERNET_KEY: ${FRIDGE_FERNET_KEY}
      BACKEND_DEBUG_API_KEY: ${FRIDGE_BACKEND_DEBUG_API_KEY}
      # OpenAI
      OPENAI_API_KEY: ${FRIDGE_OPENAI_API_KEY}
      # Google OAuth
      GOOGLE_CLIENT_ID: ${FRIDGE_GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${FRIDGE_GOOGLE_CLIENT_SECRET}
      GOOGLE_OAUTH_REDIRECT_URI: ${PUBLIC_BASE_URL}/oauth/google/callback
      GOOGLE_OAUTH_SCOPES: openid email profile https://www.googleapis.com/auth/calendar
      FRONTEND_BASE_URL: ${PUBLIC_BASE_URL}
      # CORS — production: only the public host
      ALLOWED_ORIGINS: ${PUBLIC_BASE_URL}
      # Langfuse
      LANGFUSE_HOST: http://langfuse-web:3000
      LANGFUSE_PUBLIC_KEY: ${FRIDGE_LANGFUSE_PUBLIC_KEY}
      LANGFUSE_SECRET_KEY: ${FRIDGE_LANGFUSE_SECRET_KEY}
      LANGFUSE_ENABLED: "true"
      # LiveKit — internal URL is for backend-side token minting; PUBLIC URL is
      # what gets returned to the browser in /api/livekit/token responses.
      LIVEKIT_URL: ws://livekit-server:7880
      LIVEKIT_PUBLIC_URL: ${LIVEKIT_PUBLIC_URL}
      LIVEKIT_API_KEY: ${LIVEKIT_API_KEY}
      LIVEKIT_API_SECRET: ${LIVEKIT_API_SECRET}

  fridge-frontend:
    image: ${FRIDGE_FRONTEND_IMAGE}
    restart: unless-stopped
    logging: *default-logging
    networks: [apartment]
    environment:
      NEXT_PUBLIC_BACKEND_URL: ${PUBLIC_BASE_URL}

  # LiveKit voice agent. Long-running Python process that joins LiveKit rooms
  # as the assistant participant. Uses the same image + same env as the
  # FastAPI backend (shared business logic via the `voice_worker` module).
  # When a kiosk opens voice mode, the frontend joins a room, the worker
  # auto-joins because its room-name pattern matches (`fridge-<family_id>`),
  # and the audio handshake completes. Without this service, the kiosk's
  # voice overlay shows "Voice service did not respond" after ~10s timeout.
  voice-worker:
    image: ${FRIDGE_BACKEND_IMAGE}
    restart: unless-stopped
    logging: *default-logging
    networks: [apartment]
    depends_on:
      postgres-init: { condition: service_completed_successfully }
      redis-init:    { condition: service_completed_successfully }
      livekit-server: { condition: service_started }
    environment:
      # DB
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_USER: fridge_chatbot
      POSTGRES_PASSWORD: ${FRIDGE_DB_PASSWORD}
      POSTGRES_DB: fridge_chatbot
      # Redis
      REDIS_URL: redis://fridge-chatbot:${FRIDGE_REDIS_PASSWORD}@redis:6379
      # OpenAI (LLM + STT + TTS)
      OPENAI_API_KEY: ${FRIDGE_OPENAI_API_KEY}
      # LiveKit (worker talks to LiveKit internally on the docker network)
      LIVEKIT_URL: ws://livekit-server:7880
      LIVEKIT_API_KEY: ${LIVEKIT_API_KEY}
      LIVEKIT_API_SECRET: ${LIVEKIT_API_SECRET}
      # Encryption/JWT not needed by worker but harmless to inherit.
      SECRET_KEY: ${FRIDGE_JWT_SECRET_KEY}
      FERNET_KEY: ${FRIDGE_FERNET_KEY}
      # Langfuse traces — worker's tool calls instrument under the same project.
      LANGFUSE_HOST: http://langfuse-web:3000
      LANGFUSE_PUBLIC_KEY: ${FRIDGE_LANGFUSE_PUBLIC_KEY}
      LANGFUSE_SECRET_KEY: ${FRIDGE_LANGFUSE_SECRET_KEY}
      LANGFUSE_ENABLED: "true"
      ENVIRONMENT: prod
    # Override entrypoint so we never enter FastAPI's lifespan (uvicorn is the
    # backend image's default ENTRYPOINT). The worker doesn't serve HTTP — it
    # runs livekit-agents' CLI loop. Poetry isn't in the runtime image (only
    # used during build), so we exec python directly from the venv on PATH.
    # `start` is livekit-agents' production mode; `dev` is hot-reload.
    entrypoint: ["python", "-m", "src.voice_worker.worker"]
    command: ["start"]

  # ----- Postgres + per-DB init ---------------------------------------------
  # The host port 5432 is exposed for operator pgAdmin/DBeaver access. Reach-
  # ability is gated by a GCP firewall rule that only allows tcp:5432 from
  # `operator_whitelist_ips` in terraform/prod.auto.tfvars (currently the
  # operator's residential /32). Without that firewall rule, this binding is
  # effectively private — but DO NOT remove the firewall and rely on auth
  # alone: docker-proxy binds to 0.0.0.0 the moment compose starts.
  #
  # TLS: deliberately NOT enabled. Trade-off considered:
  #   + Postgres auth is 32-char Secret-Manager-sourced; brute force unrealistic.
  #   + Traffic path is operator's residential ISP → GCP backbone, no shared L2.
  #   + Self-signed cert mgmt (generate, mount, rotate, configure pgAdmin SSL
  #     to verify-full or skip) doubles the friction for a single operator.
  #   − In-flight queries cross the public internet in plaintext. A passive
  #     observer on the operator's ISP could read DB rows.
  # Decision: defer until either (a) more than one operator joins, or (b) the
  # operator's threat model changes. Re-evaluate by switching POSTGRES image
  # config to enable ssl + mounting certs from a Secret-Manager-fed init.
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    logging: *default-logging
    networks: [apartment]
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_ADMIN_PASSWORD}
      POSTGRES_DB: postgres
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 20

  # One-shot. Idempotent. Creates per-app + langfuse DBs/users.
  # When a new app moves in, append its (role, db, password env var) triple
  # to the loop below — no separate init container per app.
  postgres-init:
    image: postgres:16-alpine
    restart: "no"
    networks: [apartment]
    depends_on:
      postgres: { condition: service_healthy }
    environment:
      PGPASSWORD: ${POSTGRES_ADMIN_PASSWORD}
      FRIDGE_DB_PASSWORD: ${FRIDGE_DB_PASSWORD}
      # Portfolio-ai-lab joined 2026-05-16. Empty string is treated as
      # "skip this app" — keeps the init forward-compatible if the operator
      # hasn't yet populated /srv/apps/portfolio-ai-lab/.env before the
      # first fridge deploy. The portfolio deploy.sh sources its own .env
      # and re-runs `docker compose up -d postgres-init` to fill the slot.
      PORTFOLIO_DB_PASSWORD: ${PORTFOLIO_DB_PASSWORD:-}
    # Why: psql's `-c` flag sends SQL verbatim WITHOUT variable substitution
    # (per psql docs). `:'pw'` only expands when SQL is read from stdin/-f,
    # not -c. Solution: pipe SQL via heredoc + psql's `:'name'` substitution.
    # `$$` in the compose entrypoint escapes to a single `$` for the shell.
    entrypoint:
      - /bin/sh
      - -c
      - |
        set -e
        # Langfuse system DB (no app role; Langfuse uses the postgres admin user).
        psql -h postgres -U postgres -tc "SELECT 1 FROM pg_database WHERE datname='langfuse'" | grep -q 1 \
          || psql -h postgres -U postgres -c "CREATE DATABASE langfuse"

        # Per-app provisioner. Args: <role> <db> <password>. Idempotent on all three.
        provision_app() {
            role="$$1"; db="$$2"; pw="$$3"
            if [ -z "$$pw" ]; then
                echo "postgres-init: skipping $$role (no password in env)"
                return
            fi
            if psql -h postgres -U postgres -tAc "SELECT 1 FROM pg_roles WHERE rolname='$$role'" | grep -q 1; then
                psql -h postgres -U postgres -v pw="$$pw" <<SQL
        ALTER ROLE "$$role" WITH LOGIN PASSWORD :'pw';
        SQL
            else
                psql -h postgres -U postgres -v pw="$$pw" <<SQL
        CREATE ROLE "$$role" WITH LOGIN PASSWORD :'pw';
        SQL
            fi
            psql -h postgres -U postgres -tc "SELECT 1 FROM pg_database WHERE datname='$$db'" | grep -q 1 \
              || psql -h postgres -U postgres -c "CREATE DATABASE \"$$db\" OWNER \"$$role\""
            psql -h postgres -U postgres -c "GRANT ALL PRIVILEGES ON DATABASE \"$$db\" TO \"$$role\""
            echo "postgres-init: provisioned $$role / $$db"
        }

        provision_app fridge_chatbot    fridge_chatbot    "$$FRIDGE_DB_PASSWORD"
        provision_app portfolio_ai_lab  portfolio_ai_lab  "$$PORTFOLIO_DB_PASSWORD"
        echo "postgres-init: OK"

  # NOTE: The postgres-backup sidecar (pg_dumpall → GCS, every 3h)
  # is apartment-wide infra, NOT fridge-specific — it lives in
  # `deploy/infrastructure/docker-compose.backups.yml` and is brought
  # up by its own `deploy/infrastructure/deploy.sh`. Run that after
  # this fridge deploy on a fresh VM so the `apartment` network it
  # attaches to (external: true) already exists.

  # ----- Redis + per-app ACL ------------------------------------------------
  # Host port 6379 exposed for operator redis-cli / RedisInsight. Same firewall
  # contract as Postgres above — reachable only from `operator_whitelist_ips`.
  #
  # TLS: NOT enabled. Redis 7 supports `--tls-port` but requires CA + cert +
  # key files + client-side stunnel/RedisInsight TLS config. For a single
  # operator on a /32 with `--requirepass` (32-char Secret-Manager value) +
  # per-app ACL users, the additional cert plumbing is not worth it today.
  # Same revisit trigger as Postgres: multi-operator, or threat model change.
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    logging: *default-logging
    networks: [apartment]
    ports:
      - "6379:6379"
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD}", "--appendonly", "yes", "--maxmemory-policy", "noeviction"]
    volumes:
      - ./data/redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "--no-auth-warning", "PING"]
      interval: 5s
      timeout: 3s
      retries: 20

  # One-shot. Adds per-app ACL users. Idempotent (ACL SETUSER overwrites).
  redis-init:
    image: redis:7-alpine
    restart: "no"
    networks: [apartment]
    depends_on:
      redis: { condition: service_healthy }
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      FRIDGE_REDIS_PASSWORD: ${FRIDGE_REDIS_PASSWORD}
      # See PORTFOLIO_DB_PASSWORD note on postgres-init for the empty-default rationale.
      PORTFOLIO_REDIS_PASSWORD: ${PORTFOLIO_REDIS_PASSWORD:-}
    entrypoint:
      - /bin/sh
      - -c
      - |
        set -e
        # Note on ACL scope: we use ~* (all keys) + &* (all channels) rather
        # than the narrower ~fridge-chatbot:* / &fridge-chatbot:* because
        # slowapi (rate limiter) writes its keys under `LIMITS:LIMITER/...`
        # without a configurable prefix, and the backend's other Redis usage
        # (pub/sub channels, OAuth state in `oauth_state:...`) also doesn't
        # namespace under the app slug. Until we wire end-to-end key
        # prefixing into the backend code, the per-app ACL must be wide.
        # Multi-app isolation will need to revisit this. Portfolio-ai-lab's
        # Redis usage is currently empty, but the ACL user is provisioned so
        # caching/rate-limiting can land later without a second redis-init pass.
        provision_user() {
            user="$$1"; pw="$$2"
            if [ -z "$$pw" ]; then
                echo "redis-init: skipping $$user (no password in env)"
                return
            fi
            redis-cli -h redis -a "$$REDIS_PASSWORD" --no-auth-warning ACL SETUSER "$$user" \
                on ">$$pw" "~*" "&*" "+@all"
            echo "redis-init: provisioned $$user"
        }
        provision_user fridge-chatbot    "$$FRIDGE_REDIS_PASSWORD"
        provision_user portfolio-ai-lab  "$$PORTFOLIO_REDIS_PASSWORD"
        redis-cli -h redis -a "$$REDIS_PASSWORD" --no-auth-warning ACL SAVE
        echo "redis-init: OK"

  # ----- Langfuse stack (clickhouse + minio + web + worker) ------------------
  clickhouse:
    image: clickhouse/clickhouse-server:24.8
    restart: unless-stopped
    logging: *default-logging
    networks: [apartment]
    # Uncapped on purpose — measuring actual usage. ClickHouse 24.8 defaults
    # to ~half host RAM (so ~15 GB on our 32 GB VM). Watch via `docker stats`
    # after a few minutes of Langfuse traffic; if usage stays under ~3-4 GB,
    # add a generous mem_limit later (e.g. 4G) just as a safety net.
    environment:
      CLICKHOUSE_DB: default
      CLICKHOUSE_USER: clickhouse
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD}
    volumes:
      - ./data/clickhouse:/var/lib/clickhouse
      - ./data/clickhouse-logs:/var/log/clickhouse-server
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8123/ping"]
      interval: 5s
      timeout: 5s
      retries: 30

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    logging: *default-logging
    networks: [apartment]
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - ./data/minio:/data

  minio-init:
    image: minio/mc:latest
    restart: "no"
    networks: [apartment]
    depends_on: [minio]
    entrypoint:
      - /bin/sh
      - -c
      - |
        until mc alias set local http://minio:9000 "${MINIO_ROOT_USER}" "${MINIO_ROOT_PASSWORD}" >/dev/null 2>&1; do
          sleep 2
        done
        mc mb --ignore-existing local/langfuse
        echo "minio-init: OK"

  langfuse-worker:
    image: langfuse/langfuse-worker:3
    restart: unless-stopped
    logging: *default-logging
    networks: [apartment]
    depends_on:
      postgres-init: { condition: service_completed_successfully }
      clickhouse:    { condition: service_healthy }
      redis:         { condition: service_healthy }
      minio-init:    { condition: service_completed_successfully }
    environment:
      DATABASE_URL: postgresql://postgres:${POSTGRES_ADMIN_PASSWORD}@postgres:5432/langfuse
      SALT: ${LANGFUSE_SALT}
      ENCRYPTION_KEY: ${LANGFUSE_ENCRYPTION_KEY}
      TELEMETRY_ENABLED: "false"
      LANGFUSE_ENABLE_EXPERIMENTAL_FEATURES: "false"
      CLICKHOUSE_URL: http://clickhouse:8123
      CLICKHOUSE_USER: clickhouse
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD}
      CLICKHOUSE_MIGRATION_URL: clickhouse://clickhouse:9000
      CLICKHOUSE_CLUSTER_ENABLED: "false"
      REDIS_CONNECTION_STRING: redis://:${REDIS_PASSWORD}@redis:6379
      LANGFUSE_S3_EVENT_UPLOAD_BUCKET: langfuse
      LANGFUSE_S3_EVENT_UPLOAD_REGION: auto
      LANGFUSE_S3_EVENT_UPLOAD_ACCESS_KEY_ID: ${MINIO_ROOT_USER}
      LANGFUSE_S3_EVENT_UPLOAD_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD}
      LANGFUSE_S3_EVENT_UPLOAD_ENDPOINT: http://minio:9000
      LANGFUSE_S3_EVENT_UPLOAD_FORCE_PATH_STYLE: "true"
      LANGFUSE_S3_EVENT_UPLOAD_PREFIX: events/

  langfuse-web:
    image: langfuse/langfuse:3
    restart: unless-stopped
    logging: *default-logging
    networks: [apartment]
    depends_on:
      langfuse-worker: { condition: service_started }
    environment:
      DATABASE_URL: postgresql://postgres:${POSTGRES_ADMIN_PASSWORD}@postgres:5432/langfuse
      NEXTAUTH_URL: ${LANGFUSE_NEXTAUTH_URL}
      NEXTAUTH_SECRET: ${LANGFUSE_NEXTAUTH_SECRET}
      SALT: ${LANGFUSE_SALT}
      ENCRYPTION_KEY: ${LANGFUSE_ENCRYPTION_KEY}
      TELEMETRY_ENABLED: "false"
      LANGFUSE_ENABLE_EXPERIMENTAL_FEATURES: "false"
      CLICKHOUSE_URL: http://clickhouse:8123
      CLICKHOUSE_USER: clickhouse
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD}
      CLICKHOUSE_MIGRATION_URL: clickhouse://clickhouse:9000
      CLICKHOUSE_CLUSTER_ENABLED: "false"
      REDIS_CONNECTION_STRING: redis://:${REDIS_PASSWORD}@redis:6379
      LANGFUSE_S3_EVENT_UPLOAD_BUCKET: langfuse
      LANGFUSE_S3_EVENT_UPLOAD_REGION: auto
      LANGFUSE_S3_EVENT_UPLOAD_ACCESS_KEY_ID: ${MINIO_ROOT_USER}
      LANGFUSE_S3_EVENT_UPLOAD_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD}
      LANGFUSE_S3_EVENT_UPLOAD_ENDPOINT: http://minio:9000
      LANGFUSE_S3_EVENT_UPLOAD_FORCE_PATH_STYLE: "true"
      LANGFUSE_S3_EVENT_UPLOAD_PREFIX: events/
      # Operator policy: web-first access via smagowski-ai-lab-langfuse.duckdns.org.
      # Lock the door — only the seeded admin user (and anyone they invite from
      # inside the UI) can sign in. New visitors cannot self-register.
      AUTH_DISABLE_SIGNUP: "true"
      # Per-app org + project model: one Langfuse org per app slug, one project
      # per app slug. On a fresh VM these LANGFUSE_INIT_* vars seed the org +
      # project + admin user atomically. On the CURRENT VM, langfuse-web has
      # already booted once with the old `prodorg` values, so changing them
      # here is necessary but NOT sufficient — Langfuse's headless init only
      # creates resources if they don't exist. The one-time migration of the
      # existing org from `prodorg` → `fridge-chatbot` is done by
      # provision-langfuse-org.sh (run once after this redeploy).
      LANGFUSE_INIT_ORG_ID: fridge-chatbot
      LANGFUSE_INIT_ORG_NAME: "Fridge Chatbot"
      LANGFUSE_INIT_PROJECT_ID: fridge-chatbot
      LANGFUSE_INIT_PROJECT_NAME: "Fridge Chatbot"
      LANGFUSE_INIT_PROJECT_PUBLIC_KEY: ${FRIDGE_LANGFUSE_PUBLIC_KEY}
      LANGFUSE_INIT_PROJECT_SECRET_KEY: ${FRIDGE_LANGFUSE_SECRET_KEY}
      LANGFUSE_INIT_USER_EMAIL: ${ADMIN_EMAIL}
      LANGFUSE_INIT_USER_NAME: "Admin"
      LANGFUSE_INIT_USER_PASSWORD: ${LANGFUSE_ADMIN_PASSWORD}

  # ----- LiveKit (voice/WebRTC) ---------------------------------------------
  # LIVEKIT_KEYS env var format is "<api-key>: <api-secret>" (literal space).
  # Avoids the CLI-arg whitespace ambiguity that bit `--keys=K: S` in compose.
  # LiveKit (voice/WebRTC). Two non-obvious settings:
  #   - LIVEKIT_KEYS env var instead of `--keys` CLI arg: an API key generated
  #     by urlsafe-base64 may start with `-`, which the CLI arg parser
  #     interprets as a flag separator and the key never registers.
  #   - --node-ip: LiveKit hands this IP to clients as the WebRTC ICE
  #     candidate. Behind a cloud-VM NAT, auto-discovery returns the
  #     internal IP (10.x.x.x) which clients can't reach. Must be the
  #     VM's external IP (computed by fetch-secrets.sh).
  livekit-server:
    image: livekit/livekit-server:latest
    restart: unless-stopped
    logging: *default-logging
    networks: [apartment]
    # --udp-port: single-port multiplexing. LiveKit v1.x demuxes thousands of
    # concurrent WebRTC peers through one UDP server port via the (client_ip,
    # client_port, server_ip, server_port) 4-tuple. No port range needed,
    # minimal docker-proxy footprint (1 process instead of N).
    command:
      - "--bind=0.0.0.0"
      - "--node-ip=${VM_EXTERNAL_IP}"
      - "--udp-port=50000"
    environment:
      LIVEKIT_KEYS: "${LIVEKIT_API_KEY}: ${LIVEKIT_API_SECRET}"
    ports:
      - "7881:7881/tcp"
      - "50000:50000/udp"

networks:
  apartment:
    name: apartment
    driver: bridge
